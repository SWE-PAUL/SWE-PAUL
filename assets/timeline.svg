<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Journey timeline: Education — BS Information Technology, Major in Business Analytics, Batangas State University ARASOF-Nasugbu, 2021 to 2025, Dean's Lister First Honor; INSIGHT 2025 — 3rd Best Research Paper for EXAMBOT; SkyPay — Software Engineer, payments and disbursement (current); Now — distributed systems and payment infrastructure">
<defs>
  <linearGradient id="jbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0A0E1A"/><stop offset="0.55" stop-color="#0B1120"/><stop offset="1" stop-color="#0E1730"/>
  </linearGradient>
  <linearGradient id="jrail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#38BDF8"/><stop offset="0.5" stop-color="#4C93F5"/><stop offset="1" stop-color="#34D399"/>
  </linearGradient>
  <radialGradient id="jnode" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#34D399" stop-opacity="0.6"/><stop offset="1" stop-color="#34D399" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="jnodeC" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#38BDF8" stop-opacity="0.7"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
  </radialGradient>
  <filter id="jsoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
</defs>
<style>
@keyframes jRail  { from{stroke-dashoffset:1000} to{stroke-dashoffset:0} }
@keyframes jPop   { from{opacity:0; transform:scale(.3)} to{opacity:1; transform:scale(1)} }
@keyframes jFade  { from{opacity:0; transform:translateY(7px)} to{opacity:1; transform:translateY(0)} }
@keyframes jPulse { 0%{transform:scale(.6);opacity:.7} 100%{transform:scale(2.5);opacity:0} }
@keyframes jFadeP { from{opacity:0} to{opacity:1} }
.j-panel { animation: jFadeP .8s ease both; }
.j-rail  { stroke-dasharray:1000; stroke-dashoffset:1000; animation: jRail 1.6s ease .2s both; }
.j-node  { transform-box: fill-box; transform-origin: center; opacity:0; }
.j-lbl   { transform-box: fill-box; opacity:0; }
.j-ring  { transform-box: fill-box; transform-origin: center; animation: jPulse 2.6s ease-out infinite; opacity:0; }
.n1{animation:jPop .5s cubic-bezier(.2,.7,.2,1) .45s both}
.n2{animation:jPop .5s cubic-bezier(.2,.7,.2,1) .75s both}
.n3{animation:jPop .5s cubic-bezier(.2,.7,.2,1) 1.05s both}
.n4{animation:jPop .5s cubic-bezier(.2,.7,.2,1) 1.35s both}
.l1{animation:jFade .5s ease .55s both}
.l2{animation:jFade .5s ease .85s both}
.l3{animation:jFade .5s ease 1.15s both}
.l4{animation:jFade .5s ease 1.45s both}
.r3{animation-delay:1.2s}.r4{animation-delay:1.5s}
@media (prefers-reduced-motion: reduce) {
  .j-panel,.j-node,.j-lbl { animation:none; opacity:1; transform:none; }
  .j-rail { animation:none; stroke-dashoffset:0; }
  .j-ring { display:none; }
}
</style>
<g class="j-panel">
  <rect width="1200" height="240" rx="16" fill="url(#jbg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="238.5" rx="16" fill="none" stroke="#24314F" stroke-width="1.5"/>
  <!-- rails -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#22304E" stroke-width="3"/>
  <line class="j-rail" x1="100" y1="120" x2="1100" y2="120" stroke="url(#jrail)" stroke-width="3" stroke-linecap="round"/>

  <!-- ══ connectors ══ -->
  <line x1="160"  y1="112" x2="160"  y2="100" stroke="#3C5488" stroke-width="1.4"/>
  <line x1="453"  y1="128" x2="453"  y2="150" stroke="#3C5488" stroke-width="1.4"/>
  <line x1="747"  y1="112" x2="747"  y2="90"  stroke="#3C5488" stroke-width="1.4"/>
  <line x1="1040" y1="128" x2="1040" y2="150" stroke="#3C5488" stroke-width="1.4"/>

  <!-- ══ label: EDUCATION (above n1) ══ -->
  <g class="j-lbl l1">
    <rect x="30" y="24" width="286" height="76" rx="10" fill="#0E1A33" stroke="#2A3B60" stroke-width="1.2"/>
    <text x="46" y="45" font-family="ui-monospace,'Courier New',monospace" font-size="12" letter-spacing="1" fill="#38BDF8">EDUCATION</text>
    <text x="46" y="66" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="600" fill="#EAF2FF">BS Info Tech · Business Analytics</text>
    <text x="46" y="87" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#9FB6DE">Batangas State U · 2021–2025 · Dean's Lister</text>
  </g>
  <!-- ══ label: INSIGHT 2025 (below n2) ══ -->
  <g class="j-lbl l2">
    <rect x="333" y="150" width="240" height="56" rx="10" fill="#0E1A33" stroke="#2A3B60" stroke-width="1.2"/>
    <circle cx="352" cy="171" r="5" fill="#D9A441"/>
    <text x="366" y="171" font-family="ui-monospace,'Courier New',monospace" font-size="13" letter-spacing="1" fill="#F0C97A">INSIGHT 2025</text>
    <text x="349" y="194" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#BFD3F5">3rd Best Research Paper · EXAMBOT</text>
  </g>
  <!-- ══ label: SKYPAY (above n3) — current ══ -->
  <g class="j-lbl l3">
    <rect x="627" y="34" width="240" height="56" rx="10" fill="#0C1A2E" stroke="#2A5CB8" stroke-width="1.3"/>
    <text x="643" y="58" font-family="ui-monospace,'Courier New',monospace" font-size="13" letter-spacing="1" fill="#38BDF8">SKYPAY</text>
    <rect x="792" y="46" width="60" height="17" rx="8.5" fill="#12241D" stroke="#1F7A55" stroke-width="1"/>
    <text x="822" y="58" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="10.5" letter-spacing="1" fill="#5EEAB4">CURRENT</text>
    <text x="643" y="79" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#EAF2FF">Software Engineer · Payments</text>
  </g>
  <!-- ══ label: NOW (below n4) ══ -->
  <g class="j-lbl l4">
    <rect x="920" y="150" width="240" height="56" rx="10" fill="#0E1A33" stroke="#2A3B60" stroke-width="1.2"/>
    <text x="936" y="171" font-family="ui-monospace,'Courier New',monospace" font-size="13" letter-spacing="1" fill="#34D399">NOW →</text>
    <text x="936" y="194" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#BFD3F5">Distributed systems · Payment infra</text>
  </g>

  <!-- ══ nodes ══ -->
  <circle class="j-node n1" cx="160"  cy="120" r="18" fill="url(#jnode)" filter="url(#jsoft)"/>
  <circle class="j-node n1" cx="160"  cy="120" r="6.5" fill="#34D399"/><circle class="j-node n1" cx="160" cy="120" r="2.6" fill="#04120C"/>
  <circle class="j-node n2" cx="453"  cy="120" r="18" fill="url(#jnode)" filter="url(#jsoft)"/>
  <circle class="j-node n2" cx="453"  cy="120" r="6.5" fill="#34D399"/><circle class="j-node n2" cx="453" cy="120" r="2.6" fill="#04120C"/>
  <circle class="j-node n3" cx="747"  cy="120" r="20" fill="url(#jnodeC)" filter="url(#jsoft)"/>
  <circle class="j-ring r3"  cx="747"  cy="120" r="9" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
  <circle class="j-node n3" cx="747"  cy="120" r="7" fill="#38BDF8"/><circle class="j-node n3" cx="747" cy="120" r="2.8" fill="#04121F"/>
  <circle class="j-node n4" cx="1040" cy="120" r="18" fill="url(#jnode)" filter="url(#jsoft)"/>
  <circle class="j-ring r4"  cx="1040" cy="120" r="9" fill="none" stroke="#34D399" stroke-width="1.5"/>
  <circle class="j-node n4" cx="1040" cy="120" r="6.5" fill="#34D399"/><circle class="j-node n4" cx="1040" cy="120" r="2.6" fill="#04120C"/>
</g>
</svg>
