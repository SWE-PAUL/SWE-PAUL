<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 302" width="1200" height="302" role="img" aria-label="Code snippet — a Kotlin money-transfer function: fun transfer(from, to, amount): requires sufficient balance, debits and credits the ledger, returns Result.Ok with a transaction id">
<defs>
  <linearGradient id="cdbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0A0E1A"/><stop offset="0.55" stop-color="#0B1120"/><stop offset="1" stop-color="#0E1730"/>
  </linearGradient>
  <linearGradient id="cdbar" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#111B31"/><stop offset="1" stop-color="#0C1424"/>
  </linearGradient>
</defs>
<style>
@keyframes cdFade { from{opacity:0} to{opacity:1} }
@keyframes cdLine { from{opacity:0; transform:translateX(8px)} to{opacity:1; transform:translateX(0)} }
@keyframes cdBlink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }
.cd-panel{animation:cdFade .7s ease both}
.cd-l{opacity:0;transform-box:fill-box;animation:cdLine .45s ease both}
.cl1{animation-delay:.30s}.cl2{animation-delay:.55s}.cl3{animation-delay:.80s}.cl4{animation-delay:1.05s}
.cl5{animation-delay:1.30s}.cl6{animation-delay:1.55s}.cl7{animation-delay:1.80s}.cl8{animation-delay:2.05s}
.cd-caret{animation:cdBlink 1.05s steps(1,end) 2.3s infinite}
@media (prefers-reduced-motion: reduce){
  .cd-panel{animation:none} .cd-l{opacity:1;animation:none;transform:none} .cd-caret{animation:none;opacity:1}
}
</style>
<g class="cd-panel">
  <rect width="1200" height="302" rx="16" fill="url(#cdbg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="300.5" rx="16" fill="none" stroke="#24314F" stroke-width="1.5"/>
  <!-- title bar -->
  <path d="M0 16 A16 16 0 0 1 16 0 H1184 A16 16 0 0 1 1200 16 V48 H0 Z" fill="url(#cdbar)"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#24314F" stroke-width="1.2"/>
  <circle cx="30" cy="24" r="6" fill="#FF5F57"/><circle cx="52" cy="24" r="6" fill="#FEBC2E"/><circle cx="74" cy="24" r="6" fill="#28C840"/>
  <text x="600" y="29" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="14" fill="#6E88BE">Transfer.kt</text>
  <!-- gutter -->
  <rect x="0" y="49" width="66" height="253" fill="#0A1120" opacity="0.6"/>
  <g font-family="ui-monospace,'Courier New',monospace" font-size="13" fill="#3C5488" text-anchor="end">
    <text x="52" y="82">1</text><text x="52" y="108">2</text><text x="52" y="134">3</text><text x="52" y="160">4</text>
    <text x="52" y="186">5</text><text x="52" y="212">6</text><text x="52" y="238">7</text><text x="52" y="264">8</text>
  </g>
  <!-- code -->
  <g font-family="ui-monospace,'Courier New',monospace" font-size="16.5" xml:space="preserve">
    <text class="cd-l cl1" x="84"  y="82"  fill="#5E82C4">// move money — safely, every time</text>
    <text class="cd-l cl2" x="84"  y="108"><tspan fill="#7FB4FF">fun</tspan><tspan fill="#38BDF8"> transfer</tspan><tspan fill="#C7D6F0">(</tspan><tspan fill="#9FD0FF">from</tspan><tspan fill="#C7D6F0">: </tspan><tspan fill="#34D399">Account</tspan><tspan fill="#C7D6F0">, </tspan><tspan fill="#9FD0FF">to</tspan><tspan fill="#C7D6F0">: </tspan><tspan fill="#34D399">Account</tspan><tspan fill="#C7D6F0">,</tspan></text>
    <text class="cd-l cl3" x="122" y="134"><tspan fill="#9FD0FF">amount</tspan><tspan fill="#C7D6F0">: </tspan><tspan fill="#34D399">Money</tspan><tspan fill="#C7D6F0">): </tspan><tspan fill="#34D399">Result</tspan><tspan fill="#C7D6F0"> {</tspan></text>
    <text class="cd-l cl4" x="122" y="160"><tspan fill="#7FB4FF">require</tspan><tspan fill="#C7D6F0">(</tspan><tspan fill="#9FD0FF">from</tspan><tspan fill="#C7D6F0">.balance &gt;= </tspan><tspan fill="#9FD0FF">amount</tspan><tspan fill="#C7D6F0">) { </tspan><tspan fill="#F0C97A">"insufficient funds"</tspan><tspan fill="#C7D6F0"> }</tspan></text>
    <text class="cd-l cl5" x="122" y="186"><tspan fill="#9FD0FF">ledger</tspan><tspan fill="#C7D6F0">.</tspan><tspan fill="#38BDF8">debit</tspan><tspan fill="#C7D6F0">(</tspan><tspan fill="#9FD0FF">from</tspan><tspan fill="#C7D6F0">, </tspan><tspan fill="#9FD0FF">amount</tspan><tspan fill="#C7D6F0">)</tspan></text>
    <text class="cd-l cl6" x="122" y="212"><tspan fill="#9FD0FF">ledger</tspan><tspan fill="#C7D6F0">.</tspan><tspan fill="#38BDF8">credit</tspan><tspan fill="#C7D6F0">(</tspan><tspan fill="#9FD0FF">to</tspan><tspan fill="#C7D6F0">, </tspan><tspan fill="#9FD0FF">amount</tspan><tspan fill="#C7D6F0">)</tspan></text>
    <text class="cd-l cl7" x="122" y="238"><tspan fill="#7FB4FF">return</tspan><tspan fill="#C7D6F0"> </tspan><tspan fill="#34D399">Result</tspan><tspan fill="#C7D6F0">.</tspan><tspan fill="#34D399">Ok</tspan><tspan fill="#C7D6F0">(</tspan><tspan fill="#9FD0FF">txnId</tspan><tspan fill="#C7D6F0"> = </tspan><tspan fill="#38BDF8">uuid</tspan><tspan fill="#C7D6F0">())</tspan></text>
    <text class="cd-l cl8" x="84"  y="264" fill="#C7D6F0">}</text>
  </g>
  <rect class="cd-caret" x="98" y="252" width="10" height="16" rx="1" fill="#34D399"/>
</g>
</svg>
