<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 552" width="1200" height="552" role="img" aria-label="Featured projects: EXAMBOT AI exam generator (Laravel, PHP, MySQL, OpenAI, JS); Credit Card Checkout integration (Java, REST, JSON, Payments); Financial Disbursement Platform (Java 17, Kotlin, Quarkus, PostgreSQL, Kubernetes, GCP)">
<defs>
  <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0E1A33"/><stop offset="0.5" stop-color="#0B1120"/><stop offset="1" stop-color="#0A0E1A"/>
  </linearGradient>
  <linearGradient id="prail" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#34D399"/>
  </linearGradient>
  <linearGradient id="ptitle" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#EAF2FF"/><stop offset="1" stop-color="#BFD3F5"/>
  </linearGradient>
  <radialGradient id="pglow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#38BDF8" stop-opacity="0.45"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="pshine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#EAF6FF" stop-opacity="0"/><stop offset="0.5" stop-color="#EAF6FF" stop-opacity="0.09"/><stop offset="1" stop-color="#EAF6FF" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="pcards">
    <rect x="20"  y="16"  width="1160" height="152" rx="16"/>
    <rect x="20"  y="196" width="1160" height="152" rx="16"/>
    <rect x="20"  y="376" width="1160" height="152" rx="16"/>
  </clipPath>
</defs>
<style>
@keyframes pPop  { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
@keyframes pRail { from{transform:scaleY(0)} to{transform:scaleY(1)} }
@keyframes pIn   { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }
@keyframes pShine{ 0%{transform:translateX(-400px)} 55%{transform:translateX(1560px)} 100%{transform:translateX(1560px)} }
.p-card { transform-box: fill-box; opacity:0; }
.p-c1 { animation: pPop .6s cubic-bezier(.2,.7,.2,1) .12s both; }
.p-c2 { animation: pPop .6s cubic-bezier(.2,.7,.2,1) .28s both; }
.p-c3 { animation: pPop .6s cubic-bezier(.2,.7,.2,1) .44s both; }
.p-rail { transform-box: fill-box; transform-origin: top; animation: pRail .6s ease .55s both; }
.p-chip { transform-box: fill-box; opacity:0; animation: pIn .45s ease both; }
.k1{animation-delay:.60s}.k2{animation-delay:.68s}.k3{animation-delay:.76s}.k4{animation-delay:.84s}.k5{animation-delay:.92s}.k6{animation-delay:1.0s}
.p-shine { animation: pShine 6s ease-in-out 1.1s infinite; }
@media (prefers-reduced-motion: reduce) {
  .p-card,.p-chip { opacity:1; animation:none; transform:none; }
  .p-rail { animation:none; transform:none; }
  .p-shine { display:none; }
}
</style>

<!-- ══ CARD 1 · EXAMBOT ══ -->
<g class="p-card p-c1">
  <rect x="20" y="16" width="1160" height="152" rx="16" fill="url(#pbg)" stroke="#24314F" stroke-width="1.4"/>
  <rect class="p-rail" x="20" y="32" width="4" height="120" rx="2" fill="url(#prail)"/>
  <circle cx="90" cy="92" r="40" fill="url(#pglow)"/>
  <rect x="52" y="62" width="72" height="60" rx="14" fill="#0A1220" stroke="#2A5CB8" stroke-width="1.4"/>
  <!-- robot mark -->
  <g stroke="#34D399" stroke-width="2.4" fill="none" stroke-linecap="round">
    <line x1="88" y1="70" x2="88" y2="78"/><circle cx="88" cy="68" r="2.6" fill="#34D399" stroke="none"/>
    <rect x="72" y="80" width="32" height="26" rx="6" stroke="#38BDF8"/>
    <circle cx="82" cy="91" r="2.6" fill="#38BDF8" stroke="none"/><circle cx="94" cy="91" r="2.6" fill="#38BDF8" stroke="none"/>
    <line x1="82" y1="100" x2="94" y2="100" stroke="#7FB4FF"/>
  </g>
  <text x="150" y="66" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="25" font-weight="800" fill="url(#ptitle)">EXAMBOT</text>
  <text x="345" y="66" font-family="ui-monospace,'Courier New',monospace" font-size="15" fill="#5E82C4">· AI Exam Generator &amp; Management</text>
  <text x="150" y="96" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#9FB6DE">Cuts exam-prep time by <tspan fill="#34D399" font-weight="700">~80%</tspan> — GPT exams, auto TOS, browser lockdown, live monitoring.</text>
  <g font-family="ui-monospace,'Courier New',monospace" font-size="13">
    <g class="p-chip k1"><rect x="150" y="118" width="77" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="188" y="134" text-anchor="middle" fill="#9FD0FF">Laravel</text></g>
    <g class="p-chip k2"><rect x="237" y="118" width="46" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="260" y="134" text-anchor="middle" fill="#9FD0FF">PHP</text></g>
    <g class="p-chip k3"><rect x="293" y="118" width="61" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="323" y="134" text-anchor="middle" fill="#9FD0FF">MySQL</text></g>
    <g class="p-chip k4"><rect x="364" y="118" width="69" height="24" rx="12" fill="#12241D" stroke="#1F7A55" stroke-width="1"/><text x="398" y="134" text-anchor="middle" fill="#5EEAB4">OpenAI</text></g>
    <g class="p-chip k5"><rect x="443" y="118" width="38" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="462" y="134" text-anchor="middle" fill="#9FD0FF">JS</text></g>
  </g>
</g>

<!-- ══ CARD 2 · CHECKOUT ══ -->
<g class="p-card p-c2">
  <rect x="20" y="196" width="1160" height="152" rx="16" fill="url(#pbg)" stroke="#24314F" stroke-width="1.4"/>
  <rect class="p-rail" x="20" y="212" width="4" height="120" rx="2" fill="url(#prail)"/>
  <circle cx="90" cy="272" r="40" fill="url(#pglow)"/>
  <rect x="52" y="242" width="72" height="60" rx="14" fill="#0A1220" stroke="#2A5CB8" stroke-width="1.4"/>
  <!-- credit-card mark -->
  <g>
    <rect x="66" y="256" width="48" height="32" rx="5" fill="none" stroke="#38BDF8" stroke-width="2.2"/>
    <rect x="66" y="264" width="48" height="7" fill="#2A5CB8"/>
    <rect x="72" y="278" width="11" height="7" rx="1.5" fill="#F5D98B"/>
  </g>
  <text x="150" y="246" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="25" font-weight="800" fill="url(#ptitle)">Credit Card Checkout</text>
  <text x="470" y="246" font-family="ui-monospace,'Courier New',monospace" font-size="15" fill="#5E82C4">· payment integration</text>
  <text x="150" y="276" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#9FB6DE">Secure online card payments — a custom, <tspan fill="#7FB4FF">PCI-conscious</tspan>, tokenized, gateway-backed flow.</text>
  <g font-family="ui-monospace,'Courier New',monospace" font-size="13">
    <g class="p-chip k1"><rect x="150" y="298" width="53" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="176" y="314" text-anchor="middle" fill="#9FD0FF">Java</text></g>
    <g class="p-chip k2"><rect x="213" y="298" width="53" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="239" y="314" text-anchor="middle" fill="#9FD0FF">REST</text></g>
    <g class="p-chip k3"><rect x="276" y="298" width="53" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="302" y="314" text-anchor="middle" fill="#9FD0FF">JSON</text></g>
    <g class="p-chip k4"><rect x="339" y="298" width="92" height="24" rx="12" fill="#12241D" stroke="#1F7A55" stroke-width="1"/><text x="385" y="314" text-anchor="middle" fill="#5EEAB4">Payments</text></g>
  </g>
</g>

<!-- ══ CARD 3 · DISBURSEMENT ══ -->
<g class="p-card p-c3">
  <rect x="20" y="376" width="1160" height="152" rx="16" fill="url(#pbg)" stroke="#24314F" stroke-width="1.4"/>
  <rect class="p-rail" x="20" y="392" width="4" height="120" rx="2" fill="url(#prail)"/>
  <circle cx="90" cy="452" r="40" fill="url(#pglow)"/>
  <rect x="52" y="422" width="72" height="60" rx="14" fill="#0A1220" stroke="#2A5CB8" stroke-width="1.4"/>
  <!-- bank mark -->
  <g stroke="#34D399" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M70 452 L88 440 L106 452" stroke="#38BDF8"/>
    <line x1="76" y1="456" x2="76" y2="474"/><line x1="88" y1="456" x2="88" y2="474"/><line x1="100" y1="456" x2="100" y2="474"/>
    <line x1="70" y1="478" x2="106" y2="478" stroke="#7FB4FF"/>
  </g>
  <text x="150" y="426" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="25" font-weight="800" fill="url(#ptitle)">Financial Disbursement Platform</text>
  <text x="150" y="456" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#9FB6DE">Cloud-native backend powering enterprise <tspan fill="#34D399">disbursement &amp; collection at scale</tspan> for a government portal.</text>
  <g font-family="ui-monospace,'Courier New',monospace" font-size="13">
    <g class="p-chip k1"><rect x="150" y="478" width="77" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="188" y="494" text-anchor="middle" fill="#9FD0FF">Java 17</text></g>
    <g class="p-chip k2"><rect x="237" y="478" width="69" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="271" y="494" text-anchor="middle" fill="#9FD0FF">Kotlin</text></g>
    <g class="p-chip k3"><rect x="316" y="478" width="77" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="354" y="494" text-anchor="middle" fill="#9FD0FF">Quarkus</text></g>
    <g class="p-chip k4"><rect x="403" y="478" width="100" height="24" rx="12" fill="#141E33" stroke="#2A5CB8" stroke-width="1"/><text x="453" y="494" text-anchor="middle" fill="#9FD0FF">PostgreSQL</text></g>
    <g class="p-chip k5"><rect x="513" y="478" width="92" height="24" rx="12" fill="#12241D" stroke="#1F7A55" stroke-width="1"/><text x="559" y="494" text-anchor="middle" fill="#5EEAB4">Kubernetes</text></g>
    <g class="p-chip k6"><rect x="615" y="478" width="53" height="24" rx="12" fill="#12241D" stroke="#1F7A55" stroke-width="1"/><text x="641" y="494" text-anchor="middle" fill="#5EEAB4">GCP</text></g>
  </g>
</g>

<!-- shimmer sweep across all cards -->
<g clip-path="url(#pcards)">
  <rect class="p-shine" x="0" y="16" width="200" height="512" fill="url(#pshine)" transform="skewX(-16)"/>
</g>
</svg>
