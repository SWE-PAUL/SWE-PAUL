<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150" role="img" aria-label="Impact metrics: ~80% exam-prep time cut, 3rd Best Research Paper INSIGHT 2025, 11 languages and frameworks shipped, payments moving 24/7 at scale">
<defs>
  <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0E1A33"/><stop offset="0.5" stop-color="#0B1120"/><stop offset="1" stop-color="#0A0E1A"/>
  </linearGradient>
  <linearGradient id="mnum" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7FB4FF"/><stop offset="0.55" stop-color="#38BDF8"/><stop offset="1" stop-color="#34D399"/>
  </linearGradient>
  <linearGradient id="mline" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#34D399"/>
  </linearGradient>
  <linearGradient id="mshine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#EAF6FF" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#EAF6FF" stop-opacity="0.10"/>
    <stop offset="1" stop-color="#EAF6FF" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="mtiles">
    <rect x="20"  y="20" width="275" height="110" rx="14"/>
    <rect x="315" y="20" width="275" height="110" rx="14"/>
    <rect x="610" y="20" width="275" height="110" rx="14"/>
    <rect x="905" y="20" width="275" height="110" rx="14"/>
  </clipPath>
</defs>
<style>
@keyframes mPop  { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
@keyframes mDraw { from{stroke-dashoffset:70} to{stroke-dashoffset:0} }
@keyframes mShine{ 0%{transform:translateX(-400px)} 55%{transform:translateX(1500px)} 100%{transform:translateX(1500px)} }
.m-tile { transform-box: fill-box; opacity:0; }
.m-a { animation: mPop .6s cubic-bezier(.2,.7,.2,1) .15s both; }
.m-b { animation: mPop .6s cubic-bezier(.2,.7,.2,1) .30s both; }
.m-c { animation: mPop .6s cubic-bezier(.2,.7,.2,1) .45s both; }
.m-d { animation: mPop .6s cubic-bezier(.2,.7,.2,1) .60s both; }
.m-line { stroke-dasharray:70; stroke-dashoffset:70; animation: mDraw .7s ease .7s forwards; }
.m-shine { animation: mShine 5.5s ease-in-out 1s infinite; }
@media (prefers-reduced-motion: reduce) {
  .m-tile { opacity:1; animation:none; transform:none; }
  .m-line { stroke-dashoffset:0; animation:none; }
  .m-shine { display:none; }
}
</style>
<!-- tiles -->
<g class="m-tile m-a">
  <rect x="20" y="20" width="275" height="110" rx="14" fill="url(#mbg)" stroke="#24314F" stroke-width="1.4"/>
  <text x="157" y="80" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="44" font-weight="800" fill="url(#mnum)">~80%</text>
  <line class="m-line" x1="122" y1="94" x2="192" y2="94" stroke="url(#mline)" stroke-width="3" stroke-linecap="round"/>
  <text x="157" y="116" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" letter-spacing="1.4" fill="#9FB6DE">EXAM-PREP TIME CUT</text>
</g>
<g class="m-tile m-b">
  <rect x="315" y="20" width="275" height="110" rx="14" fill="url(#mbg)" stroke="#24314F" stroke-width="1.4"/>
  <text x="452" y="80" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="44" font-weight="800" fill="url(#mnum)">3<tspan font-size="24">rd</tspan></text>
  <line class="m-line" x1="417" y1="94" x2="487" y2="94" stroke="url(#mline)" stroke-width="3" stroke-linecap="round"/>
  <text x="452" y="116" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" letter-spacing="1.1" fill="#9FB6DE">BEST PAPER · INSIGHT 2025</text>
</g>
<g class="m-tile m-c">
  <rect x="610" y="20" width="275" height="110" rx="14" fill="url(#mbg)" stroke="#24314F" stroke-width="1.4"/>
  <text x="747" y="80" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="44" font-weight="800" fill="url(#mnum)">11</text>
  <line class="m-line" x1="712" y1="94" x2="782" y2="94" stroke="url(#mline)" stroke-width="3" stroke-linecap="round"/>
  <text x="747" y="116" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" letter-spacing="1.1" fill="#9FB6DE">LANGS &amp; FRAMEWORKS SHIPPED</text>
</g>
<g class="m-tile m-d">
  <rect x="905" y="20" width="275" height="110" rx="14" fill="url(#mbg)" stroke="#24314F" stroke-width="1.4"/>
  <text x="1042" y="80" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="44" font-weight="800" fill="url(#mnum)">24/7</text>
  <line class="m-line" x1="1007" y1="94" x2="1077" y2="94" stroke="url(#mline)" stroke-width="3" stroke-linecap="round"/>
  <text x="1042" y="116" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" letter-spacing="1.4" fill="#9FB6DE">PAYMENTS AT SCALE</text>
</g>
<!-- shimmer sweep across all tiles -->
<g clip-path="url(#mtiles)">
  <rect class="m-shine" x="0" y="20" width="180" height="110" fill="url(#mshine)" transform="skewX(-18)"/>
</g>
</svg>
