<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 56" width="620" height="56" role="img" aria-label="Status: available for opportunities — FinTech and backend engineering">
<defs>
  <linearGradient id="stbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0E1A33"/><stop offset="1" stop-color="#0A0E1A"/>
  </linearGradient>
  <radialGradient id="stdot" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#34D399" stop-opacity="0.8"/><stop offset="1" stop-color="#34D399" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="stsh" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#EAF6FF" stop-opacity="0"/><stop offset="0.5" stop-color="#EAF6FF" stop-opacity="0.10"/><stop offset="1" stop-color="#EAF6FF" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="stclip"><rect x="6" y="6" width="608" height="44" rx="22"/></clipPath>
</defs>
<style>
@keyframes stFade { from{opacity:0} to{opacity:1} }
@keyframes stPulse{ 0%{transform:scale(.6);opacity:.7} 100%{transform:scale(2.8);opacity:0} }
@keyframes stBlink{ 0%,45%{opacity:1} 55%,100%{opacity:.25} }
@keyframes stSh   { 0%{transform:translateX(-260px)} 55%{transform:translateX(760px)} 100%{transform:translateX(760px)} }
.st-panel{animation:stFade .7s ease both}
.st-ring{transform-box:fill-box;transform-origin:center;animation:stPulse 2.2s ease-out infinite}
.st-core{animation:stBlink 2.2s ease-in-out infinite}
.st-sh{animation:stSh 5s ease-in-out 1s infinite}
@media (prefers-reduced-motion: reduce){
  .st-panel{animation:none} .st-ring{opacity:0} .st-core{animation:none} .st-sh{display:none}
}
</style>
<g class="st-panel">
  <rect x="6" y="6" width="608" height="44" rx="22" fill="url(#stbg)"/>
  <rect x="6.75" y="6.75" width="606.5" height="42.5" rx="21.5" fill="none" stroke="#1F7A55" stroke-width="1.3"/>
  <circle cx="42" cy="28" r="13" fill="url(#stdot)"/>
  <circle class="st-ring" cx="42" cy="28" r="5.5" fill="none" stroke="#34D399" stroke-width="1.3"/>
  <circle class="st-core" cx="42" cy="28" r="5" fill="#34D399"/>
  <text x="68" y="33" font-family="ui-monospace,'Courier New',monospace" font-size="14.5" letter-spacing="2" font-weight="700" fill="#5EEAB4">AVAILABLE FOR OPPORTUNITIES</text>
  <text x="418" y="33" font-family="ui-monospace,'Courier New',monospace" font-size="14.5" letter-spacing="1" fill="#5E82C4">· FinTech · Backend</text>
  <g clip-path="url(#stclip)"><rect class="st-sh" x="0" y="6" width="150" height="44" fill="url(#stsh)" transform="skewX(-16)"/></g>
</g>
</svg>
