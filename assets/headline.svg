<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="I build the systems that move money — Software Engineer at SkyPay">
<defs>
  <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0A0E1A"/><stop offset="1" stop-color="#0E1730"/>
  </linearGradient>
  <linearGradient id="htext" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#EAF2FF"/><stop offset="1" stop-color="#BFD3F5"/>
  </linearGradient>
  <linearGradient id="hrail" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#34D399"/>
  </linearGradient>
  <clipPath id="reveal"><rect id="revealRect" x="120" y="26" width="720" height="44"/></clipPath>
</defs>
<style>
@keyframes hType   { 0%{width:0} 62%{width:720px} 100%{width:720px} }
@keyframes hCaret  { 0%{transform:translateX(0)} 62%{transform:translateX(720px)} 100%{transform:translateX(720px)} }
@keyframes hBlink  { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes hSwapA  { 0%,42%{opacity:1} 50%,92%{opacity:0} 100%{opacity:1} }
@keyframes hSwapB  { 0%,42%{opacity:0} 50%,92%{opacity:1} 100%{opacity:0} }
@keyframes hFade   { from{opacity:0} to{opacity:1} }
.h-panel { animation: hFade .8s ease both; }
#revealRect { width:0; animation: hType 6s steps(35,end) infinite; }
.h-caret { transform-box: fill-box; animation: hCaret 6s steps(35,end) infinite, hBlink 1.05s steps(1,end) infinite; }
.h-roleA { animation: hSwapA 6s ease-in-out infinite; }
.h-roleB { animation: hSwapB 6s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .h-panel { animation: none; }
  #revealRect { width:720px; animation: none; }
  .h-caret { animation: none; opacity:0; }
  .h-roleA { animation: none; opacity:1; }
  .h-roleB { animation: none; opacity:0; }
}
</style>
<g class="h-panel">
  <rect width="1200" height="120" rx="16" fill="url(#hbg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="118.5" rx="16" fill="none" stroke="#24314F" stroke-width="1.5"/>
  <rect x="0" y="18" width="4" height="84" rx="2" fill="url(#hrail)"/>
  <text x="86" y="62" font-family="ui-monospace,'Courier New',monospace" font-size="34" font-weight="700" fill="#34D399">&gt;</text>
  <g clip-path="url(#reveal)">
    <text x="120" y="62" font-family="ui-monospace,'Courier New',monospace" font-size="34" font-weight="700" fill="url(#htext)" letter-spacing="0.5" xml:space="preserve">I build the systems that move money</text>
  </g>
  <rect class="h-caret" x="122" y="30" width="15" height="40" rx="2" fill="#38BDF8"/>
  <g font-family="ui-monospace,'Courier New',monospace" font-size="18" letter-spacing="2">
    <text class="h-roleA" x="120" y="98" fill="#9FB6DE">SOFTWARE ENGINEER · SKYPAY</text>
    <text class="h-roleB" x="120" y="98" fill="#9FB6DE">PAYMENTS · DISBURSEMENT · CLOUD-NATIVE</text>
  </g>
</g>
</svg>
