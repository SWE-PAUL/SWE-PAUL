<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="section divider">
<defs>
  <linearGradient id="drail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"    stop-color="#38BDF8" stop-opacity="0"/>
    <stop offset="0.5"  stop-color="#38BDF8" stop-opacity="0.85"/>
    <stop offset="1"    stop-color="#34D399" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="dnode" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#34D399" stop-opacity="0.7"/>
    <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
  </radialGradient>
  <filter id="dsoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<style>
@keyframes dMove  { 0%{offset-distance:0%;opacity:0} 12%{opacity:1} 82%{offset-distance:100%;opacity:1} 90%{offset-distance:100%;opacity:0} 100%{offset-distance:100%;opacity:0} }
@keyframes dPulse { 0%{transform:scale(.6);opacity:.7} 100%{transform:scale(2.6);opacity:0} }
@keyframes dFade  { from{opacity:0} to{opacity:1} }
.d-panel { animation: dFade .8s ease both; }
.d-flow { display:none; }
@supports (offset-path: path('M0 0')) { .d-flow { display:block; offset-path: path('M 140 20 L 1060 20'); offset-rotate:0deg; animation: dMove 3.4s ease-in-out infinite; } }
.d-ring { transform-box: fill-box; transform-origin: center; animation: dPulse 2.4s ease-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .d-panel { animation: none; }
  .d-flow { display: none; }
  .d-ring { opacity: 0; }
}
</style>
<g class="d-panel">
  <line x1="140" y1="20" x2="1060" y2="20" stroke="url(#drail)" stroke-width="1.6"/>
  <circle cx="300" cy="20" r="2.6" fill="#0E1730" stroke="#3C5488" stroke-width="1.3"/>
  <circle cx="450" cy="20" r="2.6" fill="#0E1730" stroke="#3C5488" stroke-width="1.3"/>
  <circle cx="750" cy="20" r="2.6" fill="#0E1730" stroke="#3C5488" stroke-width="1.3"/>
  <circle cx="900" cy="20" r="2.6" fill="#0E1730" stroke="#3C5488" stroke-width="1.3"/>
  <circle cx="600" cy="20" r="18" fill="url(#dnode)" filter="url(#dsoft)"/>
  <circle class="d-ring" cx="600" cy="20" r="7" fill="none" stroke="#34D399" stroke-width="1.3" opacity="0.6"/>
  <circle cx="600" cy="20" r="5" fill="#34D399"/>
  <circle cx="600" cy="20" r="2" fill="#04120C"/>
  <g class="d-flow"><circle r="5.5" fill="#38BDF8" opacity="0.5"/><circle r="2.6" fill="#EAF6FF"/></g>
</g>
</svg>
